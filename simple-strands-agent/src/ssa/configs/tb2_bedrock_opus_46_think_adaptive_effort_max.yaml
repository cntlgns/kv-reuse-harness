# TODO: (vatshank) add TB2 related fields. (dataset.name)
max_llm_iterations: 500
env:
  env_type: docker  # "docker" or "local"
  retry:
    retry_second_chance:
      max_attempts: 1
  timeout: 120
  docker:
    base_image: "swebench/sweb.eval.x86_64.django_1776_django-15987"
    workdir: "/app"
    hold_command: "bash" # TODO: can be done with docker api instead?
    command_prefix: ""
    root_setup_commands: ["apt-get update && apt-get install ripgrep"]
    setup_commands: []
    tool_install_commands: []
    internet_access: true
  local:
    workdir: "/home/gauravaz/workplace/CSM_swe/src/CodeStateMachinesSWEBench/src/examples/swebench/scripts/csm_output"

aws:
  region: "us-west-2"

dataset:
  name: tb2 # tb2 or sbv or sbpro
  identifier: fix-git
  issue_description:

agent:
  agent_id: SimpleResolverAgent
  model: us.anthropic.claude-opus-4-6-v1
  prompt_tag: tb2
  invoker: bedrock
  prompt_caching: false
  prompt_caching_params:
    strategy: custom
    cache_period: 1
  invoker_params:
    additional_request_fields:
      thinking:
        type: adaptive
      output_config:
        effort: max

  tools:
    bash_timed:
    str_replace_editor:
      restrict_workspace_create: False

hydra:
  run:
    dir: ./outputs/swebench/${now:%Y-%m-%d}/${now:%H-%M-%S}

  job_logging:
    captures:
        stdout: true
        stderr: true